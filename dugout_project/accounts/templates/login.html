{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 페이지</title>
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <style>
        body{
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0 ;
            text-align: center;
        }
        h1 {
            font-size: 50px;
            margin-bottom: 60px;  
        }
        .login-btn {
            width: 300px;
            font-size: 20px;      
            margin-top: 40px;     
            padding: 12px;
            border-radius: 5px;
        }
        .signup-btn {
            width: 150px;
            font-size: 15px; 
            padding: 12px;
        }
    </style>
</head>
<body>
    <h1>로그인</h1>
    {% if error_message %} 
        <p style="color: red;">{{ error_message }}</p>  
    {% endif %}
    <form class="user" method="POST">
        {% csrf_token %}
        <div>
            <input type="text" name="username" placeholder="아이디를 입력해주세요">
        </div>
        <br>
        <div>
            <input type="password" name="password" placeholder="비밀번호를 입력해주세요"> 
        </div>
        <br>
        <input class="btn btn-primary text-uppercase" type="submit" value="로그인">
        <hr/>
      <a href="{% provider_login_url 'google' %}">
        <i>구글 로그인</i>
      </a>
    </form>
    <hr style = "width: 300px;">
    <p>회원이 아니신가요?</p>
    <a class="btn btn-outline-primary text-uppercase" href="{% url 'accounts:signup' %}">회원가입</a>
</body>
</html>
