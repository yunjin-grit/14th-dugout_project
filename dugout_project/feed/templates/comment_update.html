{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Update comment</title>
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <header class="masthead">
        <div class="container text-center py-5">
            <h1>댓글 수정 페이지</h1>
        </div>
    </header>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form method="POST">
                    {% csrf_token %}
                    
                    {{ comment_form.as_p }}
                    
                    <div class="text-end">
                        <input type="submit" class="btn-gray" value="수정 하기" />
                    </div>
                </form>
                </div>
        </div>
    </div>
</body>
</html>
