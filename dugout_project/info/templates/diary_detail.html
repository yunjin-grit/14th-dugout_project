{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>{{ diary.title }} - 직관일기</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        <main class="flex-shrink-0">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
                <div class="container px-5">
                    <a class="navbar-brand" href="{% url 'home' %}"><span class="fw-bolder text-primary">Extra Innings</span></a>
                </div>
            </nav>

            <div class="container px-5 my-5">
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-11 col-xl-9 col-xxl-8">
                        <div class="card shadow border-0 rounded-4 p-5">
                            <h1 class="fw-bolder mb-2">{{ diary.title }}</h1>
                            <div class="text-muted mb-4">{{ diary.created_at|date:"Y년 m월 d일" }}</div>
                            
                            {% if diary.image %}
                                <div class="mb-4">
                                    <img src="{{ diary.image.url }}" class="img-fluid rounded-4" alt="일기 이미지">
                                </div>
                            {% endif %}
                            
                            <p class="fs-5 mb-4">{{ diary.body }}</p>

                            <div class="d-flex gap-2 mt-4">
                                {% if user == diary.author %}
        <a href="{% url 'diary_update' diary.id %}" class="btn btn-outline-warning px-4">수정</a>
        <a href="{% url 'diary_delete' diary.id %}" class="btn btn-outline-danger px-4" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
    {% endif %}
                                <a href="{% url 'info' %}" class="btn btn-primary px-4">목록으로</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="bg-white py-4 mt-auto">
            <div class="container px-5"><div class="small m-0 text-center">Baseball Community 2026</div></div>
        </footer>
    </body>
</html>
